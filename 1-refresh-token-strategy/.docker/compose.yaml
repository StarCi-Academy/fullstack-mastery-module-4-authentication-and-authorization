# Stack hạ tầng bài 1-refresh-token-strategy — chỉ infra, backend chạy host (nest start --watch).
# (EN: Infrastructure stack for 1-refresh-token-strategy — infra only, backend runs on host.)
#
# Thư mục: cd fullstack-mastery-module-4-authentication-and-authorization/1-refresh-token-strategy/.docker
# (EN: Working dir: cd fullstack-mastery-module-4-authentication-and-authorization/1-refresh-token-strategy/.docker)
#
# Khởi chạy: docker compose up -d
# (EN: Start: docker compose up -d)
#
# Dừng & xóa: docker compose down -v
# (EN: Stop & clean: docker compose down -v)
name: 1-refresh-token-strategy

services:
  # PostgreSQL — persistence cho bài học (TypeORM — users, refresh tokens).
  # (EN: PostgreSQL — persistence for the lesson (TypeORM — users, refresh tokens).)
  postgres:
    container_name: 1-refresh-token-strategy-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: starci_user
      POSTGRES_PASSWORD: starci_password
      POSTGRES_DB: starci_db
    ports:
      # Ánh xạ cổng host 5432 → container 5432 (PostgreSQL).
      # (EN: Map host port 5432 → container 5432 (PostgreSQL).)
      - "5432:5432"
    networks:
      - 1-refresh-token-strategy-network
    volumes:
      - pg_data:/var/lib/postgresql/data

networks:
  1-refresh-token-strategy-network:
    name: 1-refresh-token-strategy-network
    driver: bridge

volumes:
  pg_data:
