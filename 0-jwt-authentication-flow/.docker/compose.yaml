# Stack hạ tầng bài 0-jwt-authentication-flow — chỉ infra, backend chạy host (nest start --watch).
# (EN: Infrastructure stack for 0-jwt-authentication-flow — infra only, backend runs on host.)
#
# Thư mục: cd fullstack-mastery-module-4-authentication-and-authorization/0-jwt-authentication-flow/.docker
# (EN: Working dir: cd fullstack-mastery-module-4-authentication-and-authorization/0-jwt-authentication-flow/.docker)
#
# Khởi chạy: docker compose up -d
# (EN: Start: docker compose up -d)
#
# Dừng & xóa: docker compose down -v
# (EN: Stop & clean: docker compose down -v)
name: 0-jwt-authentication-flow

services:
  # PostgreSQL — persistence cho bài học (TypeORM — users).
  # (EN: PostgreSQL — persistence for the lesson (TypeORM — users).)
  postgres:
    container_name: 0-jwt-authentication-flow-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: starci_user
      POSTGRES_PASSWORD: starci_password
      POSTGRES_DB: starci_db
    ports:
      # Ánh xạ cổng host 5432 → container 5432 (PostgreSQL).
      # (EN: Map host port 5432 → container 5432 (PostgreSQL).)
      - "5432:5432"
    networks:
      - 0-jwt-authentication-flow-network
    volumes:
      - pg_data:/var/lib/postgresql/data

networks:
  0-jwt-authentication-flow-network:
    name: 0-jwt-authentication-flow-network
    driver: bridge

volumes:
  pg_data:
