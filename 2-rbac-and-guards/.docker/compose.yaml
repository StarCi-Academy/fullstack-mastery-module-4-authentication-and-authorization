# Stack hạ tầng bài 2-rbac-and-guards — chỉ infra, backend chạy host (nest start --watch).
# (EN: Infrastructure stack for 2-rbac-and-guards — infra only, backend runs on host.)
#
# Thư mục: cd fullstack-mastery-module-4-authentication-and-authorization/2-rbac-and-guards/.docker
# (EN: Working dir: cd fullstack-mastery-module-4-authentication-and-authorization/2-rbac-and-guards/.docker)
#
# Khởi chạy: docker compose up -d
# (EN: Start: docker compose up -d)
#
# Dừng & xóa: docker compose down -v
# (EN: Stop & clean: docker compose down -v)
name: 2-rbac-and-guards

services:
  # PostgreSQL — persistence cho bài học (TypeORM — users, roles).
  # (EN: PostgreSQL — persistence for the lesson (TypeORM — users, roles).)
  postgres:
    container_name: 2-rbac-and-guards-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: starci_user
      POSTGRES_PASSWORD: starci_password
      POSTGRES_DB: starci_db
    ports:
      # Ánh xạ cổng host 5432 → container 5432 (PostgreSQL).
      # (EN: Map host port 5432 → container 5432 (PostgreSQL).)
      - "5432:5432"
    networks:
      - 2-rbac-and-guards-network
    volumes:
      - pg_data:/var/lib/postgresql/data

networks:
  2-rbac-and-guards-network:
    name: 2-rbac-and-guards-network
    driver: bridge

volumes:
  pg_data:
